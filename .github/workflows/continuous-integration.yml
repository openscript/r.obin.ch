name: Continuous Integration

on: pull_request

jobs:
  check:
    name: Run some checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm i

      - name: Check
        run: pnpm check

      - name: Build
        run: pnpm build
